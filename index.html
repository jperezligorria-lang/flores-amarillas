<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flores Amarillas 🌻</title>

<style>

body{
  margin:0;
  background:#f5efe6;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#efe6d8;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:600px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.texto{
  width:55%;
  color:#333;
}

.texto h3{
  margin-top:0;
}

.flor-box{
  width:45%;
  text-align:center;
}

.flor{
  font-size:120px;
  animation:flotar 3s ease-in-out infinite;
}

@keyframes flotar{
  0%{ transform:translateY(0px);}
  50%{ transform:translateY(-10px);}
  100%{ transform:translateY(0px);}
}

.contador{
  margin-top:15px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="texto">
<h3>Flores Amarillas para el amor de mi vida:</h3>

<p>
Si pudiera elegir un lugar seguro, sería a tu lado.<br><br>
Cuanto más tiempo estoy contigo más te amo.
</p>

<p>— I Love You! 🌻🌻</p>

<div class="contador">
Mi amor por ti comenzó hace...<br>
<span id="tiempo"></span>
</div>
</div>

<div class="flor-box">
<div class="flor">🌻</div>
</div>

</div>

<script>

/* ⏱ CONTADOR DESDE 8 MARZO 2023 */
const inicio = new Date("2023-03-08T00:00:00");

function actualizar(){
  const ahora = new Date();
  const diff = ahora - inicio;

  const dias = Math.floor(diff/(1000*60*60*24));
  const horas = Math.floor(diff/(1000*60*60)%24);
  const minutos = Math.floor(diff/(1000*60)%60);
  const segundos = Math.floor(diff/1000%60);

  document.getElementById("tiempo").innerHTML =
    dias+" días "+
    horas+" horas "+
    minutos+" minutos "+
    segundos+" segundos";
}

setInterval(actualizar,1000);
actualizar();

</script>

</body>
</html>
